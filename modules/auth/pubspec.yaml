name: auth
description: Authentication module for Logistix
version: 1.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  adapters:
    git: 
      url: https://github.com/Enri-code/flutter-bootstrap-adapters
      ref: v0.2.0

  bootstrap:
    git: 
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.3.0

  logistix_ux:
    path: ../../packages/logistix_ux
  shared:
    path: ../../packages/shared

  equatable: ^2.0.5
  flutter_animate: ^4.5.0

  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.3
  form_builder_validators: ^11.0.0
  freezed_annotation: ^3.1.0
  go_router: ^17.0.1
  graphql_flutter: ^5.2.1
  json_annotation: ^4.8.1
  pinput: ^6.0.2

dev_dependencies:
  build_runner: ^2.13.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
