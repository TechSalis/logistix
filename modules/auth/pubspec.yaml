name: auth
description: Auth module for Logistix
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  adapters:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap-adapters
      ref: v0.5.5

  bootstrap:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.5.5
      
  logistix_ux:
    path: ../../packages/logistix_ux
  shared:
    path: ../../packages/shared

  flutter_bloc: ^8.1.3
  freezed_annotation: ^3.1.0
  go_router: ^17.0.1
  json_annotation: ^4.9.0
  pinput: ^5.0.0
  dio: ^5.9.2

  form_builder_validators: any
  lucide_icons_flutter: ^3.1.12
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
