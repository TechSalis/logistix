name: dispatcher
description: Dispatcher UI module with Orders, Riders, and More tabs.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  adapters:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap-adapters
      ref: v0.5.3
  bootstrap:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.5.3
  auth:
    path: ../auth
  logistix_ux:
    path: ../../packages/logistix_ux
  shared:
    path: ../../packages/shared

  currency_text_input_formatter: ^2.3.0
  flutter_bloc: ^8.1.3
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  dropdown_search: ^6.0.1
  package_info_plus: ^9.0.0
  phone_text_field: ^2.0.0
  form_builder_validators: ^11.2.0
  google_maps_flutter: ^2.14.2
  collection: ^1.19.1
  url_launcher: ^6.3.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  flutter_svg: ^2.2.4
  dio: ^5.9.2
  retrofit: ^4.9.2
  drift: ^2.32.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.15
  flutter_gen_runner: ^5.9.0
  retrofit_generator: ^10.2.5
  freezed: ^3.2.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/socials/