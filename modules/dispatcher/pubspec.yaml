name: dispatcher
description: Dispatcher UI module with Deliveries, Riders, and More tabs.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  adapters:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap-adapters
      ref: v0.5.5
  auth:
    path: ../auth
  bootstrap:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.5.5
  collection: ^1.19.1
  currency_text_input_formatter: ^2.3.0
  dio: ^5.9.2
  drift: ^2.32.1
  dropdown_search: ^6.0.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_svg: ^2.2.4
  form_builder_validators: ^11.2.0
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  google_maps_flutter: ^2.14.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logistix_ux:
    path: ../../packages/logistix_ux
  lucide_icons_flutter: ^3.1.12
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  phone_text_field: ^2.0.0
  retrofit: ^4.9.2
  share_plus: ^12.0.1
  shared:
    path: ../../packages/shared
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.4.15
  flutter_gen_runner: ^5.9.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  retrofit_generator: ^10.2.5

flutter:
