name: dispatcher
description: Dispatcher UI module with Orders, Riders, and More tabs.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  adapters:
    git: 
      url: https://github.com/Enri-code/flutter-bootstrap-adapters
      ref: v0.1.4

  bootstrap:
    git: 
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.2.4

  auth: # monorepo module
    path: ../auth
  logistix_ux: # shared package in monorepo
    path: ../../packages/logistix_ux
  shared: # shared package in monorepo
    path: ../../packages/shared

  flutter:
    sdk: flutter

  currency_text_input_formatter: ^2.3.0
  flutter_bloc: ^8.1.3
  freezed_annotation: ^2.4.1
  go_router: ^17.1.0
  dropdown_search: ^6.0.1
  timeago: ^3.5.0
  package_info_plus: ^9.0.0
  phone_text_field: ^2.0.0
  form_builder_validators: ^11.2.0
  google_maps_flutter: ^2.14.2
  collection: ^1.19.1
  url_launcher: ^6.3.2
  intl: ^0.20.2

dev_dependencies:
  build_runner: ^2.4.6

  flutter_test:
    sdk: flutter

  freezed: ^2.4.7

flutter:
  uses-material-design: true
