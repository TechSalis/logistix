name: onboarding
description: Onboarding module for Logistix
version: 1.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  auth:
    path: ../auth
  logistix_ux:
    path: ../../packages/logistix_ux
  shared:
    path: ../../packages/shared

  bootstrap:
    git: 
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.3.0

  dropdown_search: ^6.0.1
  google_places_autocomplete: ^2.1.2
  equatable: ^2.0.5
  flutter_animate: ^4.5.0

  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.3
  form_builder_validators: ^11.0.0
  freezed_annotation: ^3.1.0
  go_router: ^17.0.1
  graphql_flutter: ^5.2.1
  json_annotation: ^4.8.1
  phone_text_field: ^2.0.0
  file_picker: ^10.3.10
  http: ^1.6.0
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  build_runner: ^2.13.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
