name: workspace
publish_to: none

environment:
  sdk: ^3.9.2

workspace:
  - packages/logistix_ux/
  - packages/shared/

  - modules/auth/
  - modules/dispatcher/
  - modules/onboarding/
  - modules/rider/
  - modules/__customer/

  - app/

dev_dependencies:
  melos: ^7.3.0

melos:
  scripts:
    setup:
      description: "Bootstrap workspace (link packages + deps) and then run build"
      run: |
        melos bootstrap
        melos build

    build:
      description: "Run package build where applicable"
      exec: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        dependsOn: [build_runner]

    build-clean:
      description: "Run package build where applicable"
      exec: dart run build_runner clean
      packageFilters:
        dependsOn: [build_runner]

    analyze:
      description: "Run package analysis"
      exec: dart analyze

    apply-fix:
      description: "Run package analysis"
      exec: dart fix --apply

    pub-upgrade:
      exec: flutter pub upgrade
      description: Run "flutter pub upgrade" in all packages.