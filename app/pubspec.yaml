name: logistix
description: "A new Flutter project."
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Modules
  auth:
    path: ../modules/auth
  onboarding:
    path: ../modules/onboarding
  dispatcher:
    path: ../modules/dispatcher
  rider:
    path: ../modules/rider
  logistix_ux:
    path: ../packages/logistix_ux
  shared:
    path: ../packages/shared

  # Core dependencies
  awesome_notifications_core:
  awesome_notifications: ^0.11.0
  awesome_notifications_fcm: ^0.11.0
  firebase_core: ^4.6.0
  
  adapters:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap-adapters
      ref: v0.5.5

  bootstrap:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.5.5

  flutter_bloc: ^8.1.3
  flutter_native_splash: ^2.4.1
  go_router: ^17.0.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.0.0
  graphql_flutter: ^5.2.1
  connectivity_plus: ^6.1.3
  sentry_flutter: ^9.14.0
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  very_good_analysis: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

sentry:
  project: flutter
  org: logistix