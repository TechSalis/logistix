targets:
  $default:
    builders:
      flutter_gen:
        options:
          output: lib/generated/
          line_length: 80
          integrations:
            image: true
            flutter_svg: true
          fonts:
            outputs:
              class_name: LogistixFonts
              package_parameter_enabled: true
          assets:
            outputs:
              class_name: LogistixAssets
              package_parameter_enabled: true
      source_gen:combining_builder:
        options:
          preamble: |
            // coverage:ignore-file
