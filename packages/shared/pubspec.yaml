name: shared
description: Shared entities, utilities, and common code for Logistix modules
version: 1.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  bootstrap:
    git: 
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.2.4

  logistix_ux:
    path: ../logistix_ux

  equatable: ^2.0.5
  flutter_bloc: ^8.1.3
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^2.4.1
  go_router: ^17.0.0
  graphql_flutter: ^5.2.1
  http: ^1.6.0
  hydrated_bloc: ^9.1.2
  json_annotation: ^4.8.1
  mime: ^2.0.0
  google_places_autocomplete: ^2.1.2
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
