name: shared
description: Shared entities, utilities, and common code for Logistix modules
version: 1.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  adapters:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap-adapters
      ref: v0.5.5

  bootstrap:
    git:
      url: https://github.com/Enri-code/flutter-bootstrap
      ref: v0.5.5

  logistix_ux:
    path: ../logistix_ux

  awesome_notifications: ^0.11.0
  awesome_notifications_fcm: ^0.11.0
  dio: ^5.9.2
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  dropdown_search: ^6.0.2
  flutter_bloc: ^8.1.3
  flutter_secure_storage: ^10.0.0
  flutter_sharing_intent: ^2.0.4
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.2
  go_router: ^17.0.1
  google_places_autocomplete: ^2.1.2
  graphql_flutter: ^5.2.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  lucide_icons_flutter: ^3.1.12
  path: ^1.9.0
  path_provider: ^2.1.5
  timeago: ^3.7.1
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true